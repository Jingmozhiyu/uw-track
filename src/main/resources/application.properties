# ===============================
# Profile Settings
# ===============================
spring.profiles.active=dev

# ===============================
# UW API & App Settings
# ===============================
uw-api.term-id=1264
uw-api.subject-id=266
uw-api.user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36
monitor.scheduler-heartbeat-ms=1000
monitor.scheduler-fetch-interval-ms=3000

logging.file.name=logs/application.log
logging.level.com.jing.monitor=INFO

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=604800000
app.auth.admin.email=${ADMIN_EMAIL}
app.auth.admin.password=${ADMIN_PASSWORD}

# ===============================
# Redis
# ===============================
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}

# ===============================
# RabbitMQ
# ===============================
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
app.rabbitmq.exchange=uwtrack.alert.exchange
app.rabbitmq.routing-key=uwtrack.alert.routing
app.rabbitmq.queue=uwtrack.alert.queue
app.rabbitmq.dlx-exchange=uwtrack.alert.dlx.exchange
app.rabbitmq.dlq-routing-key=uwtrack.alert.dlq.routing
app.rabbitmq.dlq=uwtrack.alert.dlq

# ===============================
# Email Configuration (SMTP)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_ADDRESS}
spring.mail.password=${MAIL_AUTH_CODE}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from=${MAIL_ADDRESS}

# ===============================
# Database & JPA Common Settings
# ===============================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.check_nullability=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

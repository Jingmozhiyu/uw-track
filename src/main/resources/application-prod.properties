# ===============================
# Remote Docker MySQL Database
# ===============================
spring.datasource.url=jdbc:mysql://db:3306/course_monitor_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=utf-8&createDatabaseIfNotExist=true

spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

# ===============================
# Production JPA Settings
# ===============================
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update